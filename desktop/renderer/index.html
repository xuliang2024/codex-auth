<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:" />
  <title>Accounts for Codex</title>
  <link rel="icon" href="../build/icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="titlebar" data-tauri-drag-region="deep">
    <div class="titlebar-drag" data-tauri-drag-region></div>
    <div class="header-content">
      <div class="header-left">
        <img class="app-mark" src="../build/icon.svg" alt="" aria-hidden="true" />
        <div class="header-copy">
          <div class="title-line">
            <h1 data-i18n="app.title">Accounts for Codex</h1>
            <span id="app-version" class="app-version hidden"></span>
          </div>
          <span class="subtitle" id="summary">—</span>
        </div>
      </div>
      <div class="header-right">
        <button id="login-btn" class="btn btn-primary" data-i18n-title="btn.addAccount.tip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 5v14M5 12h14" />
          </svg>
          <span data-i18n="btn.addAccount">Add Account</span>
        </button>
        <button id="add-api-btn" class="btn btn-secondary" data-i18n-title="btn.addApi.tip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 5v14M5 12h14" />
          </svg>
          <span data-i18n="btn.addApi">Add API</span>
        </button>
        <button id="refresh-btn" class="btn btn-secondary" data-i18n-title="btn.refresh.tip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-2.64-6.36" />
            <polyline points="21 3 21 9 15 9" />
          </svg>
          <span data-i18n="btn.refresh">Refresh Usage</span>
        </button>
        <button id="import-btn" class="btn btn-secondary" data-i18n-title="btn.import.tip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          <span data-i18n="btn.import">Import</span>
        </button>
        <button id="export-btn" class="btn btn-secondary" data-i18n-title="btn.export.tip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          <span data-i18n="btn.export">Export</span>
        </button>
        <button id="download-codex-btn" class="btn btn-secondary" data-i18n-title="btn.downloadCodex.tip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          <span data-i18n="btn.downloadCodex">Download Codex</span>
        </button>
        <div class="view-toggle" role="group">
          <button id="view-list-btn" class="view-btn" data-i18n-title="view.list.tip">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="4" y1="6" x2="20" y2="6" />
              <line x1="4" y1="12" x2="20" y2="12" />
              <line x1="4" y1="18" x2="20" y2="18" />
            </svg>
          </button>
          <button id="view-grid-btn" class="view-btn" data-i18n-title="view.grid.tip">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1" />
              <rect x="14" y="3" width="7" height="7" rx="1" />
              <rect x="3" y="14" width="7" height="7" rx="1" />
              <rect x="14" y="14" width="7" height="7" rx="1" />
            </svg>
          </button>
        </div>
        <select id="lang-select" class="lang-select" data-i18n-title="lang.tip">
          <option value="en">English</option>
          <option value="zh">中文</option>
          <option value="ja">日本語</option>
        </select>
      </div>
    </div>
  </header>

  <div id="login-banner" class="login-banner hidden">
    <span class="login-spinner"></span>
    <span class="login-text" data-i18n="login.waiting">Waiting for browser sign-in… complete the login in your browser.</span>
    <button id="login-cancel-btn" class="btn btn-secondary" data-i18n="btn.cancel">Cancel</button>
  </div>

  <div id="api-form" class="api-form hidden">
    <div class="api-form-title" data-i18n="apiForm.title">Add API provider account</div>
    <div class="api-form-grid">
      <label for="api-base-url" data-i18n="apiForm.endpoint">Endpoint</label>
      <input id="api-base-url" type="text" placeholder="https://codex.example.com" spellcheck="false" />
      <label for="api-key" data-i18n="apiForm.apiKey">API key</label>
      <input id="api-key" type="password" placeholder="sk-..." spellcheck="false" />
      <label for="api-name" data-i18n="apiForm.name">Name</label>
      <input id="api-name" type="text" data-i18n-placeholder="apiForm.name.placeholder" placeholder="optional, e.g. apiz" spellcheck="false" />
      <label for="api-model" data-i18n="apiForm.model">Model</label>
      <input id="api-model" type="text" data-i18n-placeholder="apiForm.model.placeholder" placeholder="optional, e.g. gpt-5.5" spellcheck="false" />
    </div>
    <div id="api-test-status" class="api-test-status hidden"></div>
    <div class="api-form-actions">
      <button id="api-form-test" class="btn btn-secondary">
        <span id="api-test-spinner" class="login-spinner hidden"></span>
        <span data-i18n="apiForm.test">Test Endpoint</span>
      </button>
      <span class="api-form-spacer"></span>
      <button id="api-form-cancel" class="btn btn-secondary" data-i18n="btn.cancel">Cancel</button>
      <button id="api-form-save" class="btn btn-primary" data-i18n="apiForm.save">Add &amp; Switch</button>
    </div>
  </div>

  <div id="announcement-bar" class="announcement-bar hidden" role="region" aria-label="Announcements"></div>

  <main id="account-list" class="account-list"></main>

  <div id="empty-state" class="empty-state hidden">
    <p class="empty-title" data-i18n="empty.title">No accounts found</p>
    <p class="empty-hint" data-i18n="empty.hint">Choose how you want to get started.</p>
    <div class="empty-actions">
      <button id="empty-import-btn" class="empty-option" data-i18n-title="btn.import.tip">
        <span class="empty-option-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
        </span>
        <span class="empty-option-copy">
          <span class="empty-option-title" data-i18n="btn.import">Import</span>
          <span class="empty-option-desc" data-i18n="empty.importDesc">Use this if you already have a JSON backup or share link.</span>
        </span>
      </button>
      <button id="empty-login-btn" class="empty-option empty-option-primary" data-i18n-title="btn.addAccount.tip">
        <span class="empty-option-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
            <path d="M12 5v14M5 12h14" />
          </svg>
        </span>
        <span class="empty-option-copy">
          <span class="empty-option-title" data-i18n="empty.newAccount">New Account</span>
          <span class="empty-option-desc" data-i18n="empty.newAccountDesc">Use this for first-time setup. A browser sign-in will open.</span>
        </span>
      </button>
      <button id="empty-download-codex-btn" class="empty-option" data-i18n-title="btn.downloadCodex.tip">
        <span class="empty-option-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
        </span>
        <span class="empty-option-copy">
          <span class="empty-option-title" data-i18n="btn.downloadCodex">Download Codex</span>
          <span class="empty-option-desc" data-i18n="empty.downloadCodexDesc">Use this if Codex is not installed on this computer yet.</span>
        </span>
      </button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <span id="modal-icon" class="modal-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
            <line x1="12" y1="9" x2="12" y2="13" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
          </svg>
        </span>
        <h2 id="modal-title" class="modal-title"></h2>
      </div>
      <p id="modal-message" class="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-secondary"></button>
        <button id="modal-confirm" class="btn btn-primary"></button>
      </div>
    </div>
  </div>

  <div id="choice-overlay" class="modal-overlay hidden">
    <div class="modal choice-modal" role="dialog" aria-modal="true" aria-labelledby="choice-title">
      <div class="modal-header">
        <span class="modal-icon warn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
            <line x1="12" y1="9" x2="12" y2="13" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
          </svg>
        </span>
        <h2 id="choice-title" class="modal-title"></h2>
      </div>
      <p id="choice-message" class="modal-message"></p>
      <div class="choice-actions">
        <button id="choice-primary" class="choice-option choice-option-primary">
          <span class="choice-option-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <path d="M14 2v6h6" />
              <path d="M12 18v-6" />
              <path d="m9 15 3 3 3-3" />
            </svg>
          </span>
          <span class="choice-option-copy">
            <span id="choice-primary-title" class="choice-option-title"></span>
            <span id="choice-primary-desc" class="choice-option-desc"></span>
          </span>
        </button>
        <button id="choice-secondary" class="choice-option">
          <span class="choice-option-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.07 0l2.83-2.83a5 5 0 0 0-7.07-7.07L11 4.93" />
              <path d="M14 11a5 5 0 0 0-7.07 0L4.1 13.83a5 5 0 0 0 7.07 7.07L13 19.07" />
            </svg>
          </span>
          <span class="choice-option-copy">
            <span id="choice-secondary-title" class="choice-option-title"></span>
            <span id="choice-secondary-desc" class="choice-option-desc"></span>
          </span>
        </button>
      </div>
      <div class="modal-actions choice-footer">
        <button id="choice-cancel" class="btn btn-ghost"></button>
      </div>
    </div>
  </div>

  <div id="prompt-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="prompt-title">
      <div class="modal-header">
        <span class="modal-icon warn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
            <line x1="12" y1="9" x2="12" y2="13" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
          </svg>
        </span>
        <h2 id="prompt-title" class="modal-title"></h2>
      </div>
      <p id="prompt-message" class="modal-message"></p>
      <label id="prompt-label" class="prompt-label" for="prompt-input"></label>
      <input id="prompt-input" class="prompt-input" type="text" spellcheck="false" />
      <div class="modal-actions">
        <button id="prompt-cancel" class="btn btn-secondary"></button>
        <button id="prompt-confirm" class="btn btn-primary"></button>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="runtime-bridge.js"></script>
  <script src="app.js"></script>
</body>
</html>
