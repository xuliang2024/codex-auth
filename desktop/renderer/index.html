<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:" />
  <title>Codex Auth</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="titlebar">
    <div class="titlebar-drag"></div>
    <div class="header-content">
      <div class="header-left">
        <h1 data-i18n="app.title">Codex Accounts</h1>
        <span class="subtitle" id="summary">—</span>
      </div>
      <div class="header-right">
        <button id="login-btn" class="btn btn-primary" data-i18n-title="btn.addAccount.tip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 5v14M5 12h14" />
          </svg>
          <span data-i18n="btn.addAccount">Add Account</span>
        </button>
        <button id="add-api-btn" class="btn btn-secondary" data-i18n-title="btn.addApi.tip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 5v14M5 12h14" />
          </svg>
          <span data-i18n="btn.addApi">Add API</span>
        </button>
        <button id="refresh-btn" class="btn btn-secondary" data-i18n-title="btn.refresh.tip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-2.64-6.36" />
            <polyline points="21 3 21 9 15 9" />
          </svg>
          <span data-i18n="btn.refresh">Refresh Usage</span>
        </button>
        <select id="lang-select" class="lang-select" data-i18n-title="lang.tip">
          <option value="en">English</option>
          <option value="zh">中文</option>
          <option value="ja">日本語</option>
        </select>
      </div>
    </div>
  </header>

  <div id="login-banner" class="login-banner hidden">
    <span class="login-spinner"></span>
    <span class="login-text" data-i18n="login.waiting">Waiting for browser sign-in… complete the login in your browser.</span>
    <button id="login-cancel-btn" class="btn btn-secondary" data-i18n="btn.cancel">Cancel</button>
  </div>

  <div id="api-form" class="api-form hidden">
    <div class="api-form-title" data-i18n="apiForm.title">Add API provider account</div>
    <div class="api-form-grid">
      <label for="api-base-url" data-i18n="apiForm.endpoint">Endpoint</label>
      <input id="api-base-url" type="text" placeholder="https://codex.example.com" spellcheck="false" />
      <label for="api-key" data-i18n="apiForm.apiKey">API key</label>
      <input id="api-key" type="password" placeholder="sk-..." spellcheck="false" />
      <label for="api-name" data-i18n="apiForm.name">Name</label>
      <input id="api-name" type="text" data-i18n-placeholder="apiForm.name.placeholder" placeholder="optional, e.g. apiz" spellcheck="false" />
      <label for="api-model" data-i18n="apiForm.model">Model</label>
      <input id="api-model" type="text" data-i18n-placeholder="apiForm.model.placeholder" placeholder="optional, e.g. gpt-5.5" spellcheck="false" />
    </div>
    <div id="api-test-status" class="api-test-status hidden"></div>
    <div class="api-form-actions">
      <button id="api-form-test" class="btn btn-secondary">
        <span id="api-test-spinner" class="login-spinner hidden"></span>
        <span data-i18n="apiForm.test">Test Endpoint</span>
      </button>
      <span class="api-form-spacer"></span>
      <button id="api-form-cancel" class="btn btn-secondary" data-i18n="btn.cancel">Cancel</button>
      <button id="api-form-save" class="btn btn-primary" data-i18n="apiForm.save">Add &amp; Switch</button>
    </div>
  </div>

  <main id="account-list" class="account-list"></main>

  <div id="empty-state" class="empty-state hidden">
    <p class="empty-title" data-i18n="empty.title">No accounts found</p>
    <p class="empty-hint" data-i18n-html="empty.hint">Run <code>codex-auth login</code> in a terminal to add your first account.</p>
  </div>

  <div id="toast" class="toast hidden"></div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <span id="modal-icon" class="modal-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
            <line x1="12" y1="9" x2="12" y2="13" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
          </svg>
        </span>
        <h2 id="modal-title" class="modal-title"></h2>
      </div>
      <p id="modal-message" class="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-secondary"></button>
        <button id="modal-confirm" class="btn btn-primary"></button>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
