name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  classify:
    name: Classify commit
    runs-on: ubuntu-latest
    outputs:
      skip_release: ${{ steps.release.outputs.skip_release }}
    steps:
      - id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$EVENT_NAME" == "push" && "$HEAD_MESSAGE" == chore:\ release\ v* ]]; then
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_release=false" >> "$GITHUB_OUTPUT"
          fi

  build-test:
    name: Build & Test (${{ matrix.os }})
    needs: classify
    if: ${{ needs.classify.outputs.skip_release != 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: Loongphy/setup-zig@node24-lts-runtime
        with:
          version: 0.16.0

      - name: Zig test
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          zig version
          zig build test

      - name: Zig test (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          zig version
          zig build test -j1

  tauri-build:
    name: Tauri (${{ matrix.name }})
    needs: classify
    if: ${{ needs.classify.outputs.skip_release != 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            target: aarch64-apple-darwin
            bundles: dmg
          - name: macOS x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - name: Windows arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundles: nsis

    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/.tauri-target
      CARGO_TERM_COLOR: always
      APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.os, 'macos-') && '-' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop-tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: desktop-tauri
        run: npm ci

      - name: Test runtime bridge
        working-directory: desktop-tauri
        run: npm test

      - name: Test Rust backend
        working-directory: desktop-tauri
        run: cargo test --manifest-path src-tauri/Cargo.toml --target ${{ matrix.target }}

      - name: Build installer
        working-directory: desktop-tauri
        run: npm run build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Smoke test NSIS installer
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        working-directory: desktop-tauri
        run: ./scripts/smoke-nsis.ps1 -Target "${{ matrix.target }}" -TargetDirectory "${{ env.CARGO_TARGET_DIR }}"

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: tauri-${{ matrix.target }}
          path: |
            .tauri-target/${{ matrix.target }}/release/bundle/dmg/*
            .tauri-target/${{ matrix.target }}/release/bundle/nsis/*
          if-no-files-found: error
          retention-days: 7
